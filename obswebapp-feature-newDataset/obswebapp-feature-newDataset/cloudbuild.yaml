steps:
  # Build the Docker image (multi-stage: Node frontend + Python backend)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/otel-dashboard
      - .
    timeout: '600s'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/otel-dashboard

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - otel-dashboard
      - --image=gcr.io/$PROJECT_ID/otel-dashboard
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=7860
      - --set-env-vars=APP_ENV=cloud,GCP_PROJECT=$PROJECT_ID,BQ_DATASET=otel_raw_dataset

images:
  - gcr.io/$PROJECT_ID/otel-dashboard

timeout: '900s'

options:
  logging: CLOUD_LOGGING_ONLY
