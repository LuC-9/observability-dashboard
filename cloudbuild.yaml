# Cloud Build pipeline — triggered on push to feature/newUI.
#
# Set on the trigger (Console → Cloud Build → Triggers → Edit → Substitution variables):
#   _GOOGLE_CLIENT_ID  15226554049-um1vusm2g496acqns3irsfd8fp6ohd2u.apps.googleusercontent.com
#   _ALLOWED_DOMAIN    loreal.com
#   _BQ_DATASET        otel_raw_dataset      (or cds_otel, whichever you're querying)

steps:
  # Build the multi-stage image (Vite SPA + FastAPI)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/otel-dashboard
      - .
    timeout: '600s'

  # Push to gcr.io (auto-routed to Artifact Registry)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/otel-dashboard

  # Deploy to Cloud Run with all env vars set here (the "real" .env)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - otel-dashboard
      - --image=gcr.io/$PROJECT_ID/otel-dashboard
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=7860
      - --set-env-vars=APP_ENV=cloud,GCP_PROJECT=$PROJECT_ID,BQ_DATASET=${_BQ_DATASET},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},ALLOWED_DOMAIN=${_ALLOWED_DOMAIN}

images:
  - gcr.io/$PROJECT_ID/otel-dashboard

timeout: '900s'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _BQ_DATASET: otel_raw_dataset
  _GOOGLE_CLIENT_ID: ""
  _ALLOWED_DOMAIN: loreal.com
