# Cloud Build pipeline triggered on push to feature/newUI.
#
# Configure the trigger in Console → Cloud Build → Triggers → your trigger → EDIT.
# Under "Substitution variables", add the values below. Anything sensitive
# (JWT_SECRET, ADMIN_PASS) belongs in Secret Manager — see --set-secrets below.
#
# Required substitutions (set on the trigger):
#   _REGION             us-central1
#   _SERVICE            otel-dashboard
#   _IMAGE              gcr.io/oa-apmena-techsandbox-ap-dv/otel-dashboard
#   _APP_ENV            cloud
#   _GCP_PROJECT        oa-apmena-observability-dv
#   _BQ_DATASET         cds_otel
#   _GOOGLE_CLIENT_ID   15226554049-...apps.googleusercontent.com
#   _ALLOWED_DOMAIN     loreal.com
#   _SERVICE_ACCOUNT    dashboard-readonly@oa-apmena-observability-dv.iam.gserviceaccount.com
#
# Optional (in Secret Manager — create them once, then reference here):
#   _JWT_SECRET_NAME    jwt-secret      (Secret Manager secret name)
#   _ADMIN_PASS_NAME    admin-pass      (optional; only if you keep the user/pass fallback)
#
# Use ${COMMIT_SHA} for image tags so each build is uniquely identifiable
# and Cloud Run rollbacks are trivial.

steps:
  # 1. Build the container image (multi-stage: Vite SPA + FastAPI)
  - id: "build"
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}:${COMMIT_SHA}
      - -t
      - ${_IMAGE}:latest
      - .

  # 2. Push both tags
  - id: "push-sha"
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:${COMMIT_SHA}"]
  - id: "push-latest"
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:latest"]

  # 3. Deploy to Cloud Run with env vars + secrets
  - id: "deploy"
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SERVICE_ACCOUNT}
      - --allow-unauthenticated
      - --port=7860
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=4
      - --set-env-vars=APP_ENV=${_APP_ENV},GCP_PROJECT=${_GCP_PROJECT},BQ_DATASET=${_BQ_DATASET},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},ALLOWED_DOMAIN=${_ALLOWED_DOMAIN}
      # Secrets — keep JWT_SECRET out of plain env. Uncomment after you create them.
      # - --set-secrets=JWT_SECRET=${_JWT_SECRET_NAME}:latest,ADMIN_PASS=${_ADMIN_PASS_NAME}:latest

images:
  - ${_IMAGE}:${COMMIT_SHA}
  - ${_IMAGE}:latest

# Push the tagged image to Artifact Registry & log streams
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

# Default substitution values (overridable on the trigger)
substitutions:
  _REGION:          us-central1
  _SERVICE:         otel-dashboard
  _IMAGE:           gcr.io/oa-apmena-techsandbox-ap-dv/otel-dashboard
  _APP_ENV:         cloud
  _GCP_PROJECT:     oa-apmena-observability-dv
  _BQ_DATASET:      cds_otel
  _GOOGLE_CLIENT_ID: ""
  _ALLOWED_DOMAIN:  loreal.com
  _SERVICE_ACCOUNT: dashboard-readonly@oa-apmena-observability-dv.iam.gserviceaccount.com

timeout: 1200s
